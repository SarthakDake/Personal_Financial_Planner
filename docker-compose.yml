services:
  backend:
    build:
      context: .
      target: backend
    ports:
      - "8000:8000"
    environment:
      APP_ENV: production
      DEBUG: "false"
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-use-long-random-string}
      DATABASE_URL: postgresql+psycopg2://fp_user:fp_password@db:5432/financial_planner
      CORS_ORIGINS: http://localhost:80,http://localhost:5173,http://localhost
      CONFIG_DIR: /app/config
      REPORTS_DIR: /app/output/reports
      CHARTS_DIR: /app/output/charts
    volumes:
      - reports_data:/app/output/reports
      - charts_data:/app/output/charts
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      target: frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fp_user
      POSTGRES_PASSWORD: fp_password
      POSTGRES_DB: financial_planner
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fp_user -d financial_planner"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
  reports_data:
  charts_data:
